<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile — NarrowScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-hero {
      text-align: center;
      padding: 2rem 1rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .p-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700;
      color: rgba(0,0,0,0.6); margin-bottom: 0.5rem;
    }

    .p-name { font-size: 1.5rem; font-weight: 700; }
    .p-rank { font-family: 'JetBrains Mono', monospace; color: var(--dim); font-size: 0.85rem; }

    .p-social {
      display: flex; justify-content: center; gap: 2rem; margin-top: 0.75rem;
    }
    .p-social-item { text-align: center; }
    .p-social-num { font-weight: 700; font-size: 1.1rem; }
    .p-social-label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

    .p-follow-btn {
      margin-top: 1rem;
      padding: 0.5rem 2rem;
      border-radius: 20px;
      border: 1px solid var(--cyan);
      background: transparent;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .p-follow-btn:hover { background: rgba(0,204,255,0.1); }
    .p-follow-btn.following { background: var(--cyan); color: var(--bg); }

    .p-score-section {
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .p-score-big {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.5rem; font-weight: 700; line-height: 1;
    }

    .p-bar {
      width: 80%; max-width: 300px; height: 10px;
      background: var(--bg4); border-radius: 5px;
      margin: 0.75rem auto; overflow: hidden;
    }
    .p-bar-fill { height: 100%; border-radius: 5px; }

    .p-stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }

    .p-stat {
      text-align: center; padding: 1rem 0.5rem;
      border-right: 1px solid var(--border);
    }
    .p-stat:last-child { border-right: none; }
    .p-stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .p-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; margin-top: 2px; }

    .p-badges {
      padding: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    .badge-tag {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 16px;
      padding: 0.3rem 0.75rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
    }

    .p-tools {
      padding: 1rem; display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
    }
    .tool-tag {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.2rem 0.6rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
      color: var(--cyan);
    }

    .p-comments { padding: 1rem; max-width: 600px; margin: 0 auto; }
    .comment {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem; margin-bottom: 0.5rem;
    }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .comment-user { font-weight: 600; font-size: 0.85rem; }
    .comment-time { font-size: 0.7rem; color: var(--dim); }
    .comment-text { font-size: 0.85rem; color: var(--text); }

    .comment-form {
      display: flex; gap: 0.5rem; margin-top: 0.75rem;
    }
    .comment-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 0.75rem; color: var(--text); font-family: inherit; font-size: 0.85rem;
      outline: none;
    }
    .comment-input:focus { border-color: var(--cyan); }
    .comment-submit {
      background: var(--cyan); color: var(--bg); border: none; border-radius: 8px;
      padding: 0.5rem 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }

    /* Score history graph */
    .p-history { padding: 1rem; }
    .p-history canvas { width: 100%; height: 150px; }
  </style>
</head>
<body>

  <header class="top-nav">
    <a href="/" class="logo">NARROWSCORE</a>
    <nav>
      <a href="/" data-page="home">Leaderboard</a>
      <a href="/feed.html" data-page="feed">Feed</a>
      <a href="#" class="auth-link" data-page="profile">Login</a>
    </nav>
  </header>

  <div id="profile-content">
    <div class="loading" style="padding:4rem"><span class="spinner"></span>Loading profile...</div>
  </div>

  <nav class="bottom-nav">
    <a href="/" data-page="home">
      <span class="icon">🏆</span>Board
    </a>
    <a href="/feed.html" data-page="feed">
      <span class="icon">📡</span>Feed
    </a>
    <a href="#" class="auth-link" data-page="profile" style="position:relative">
      <span class="icon">👤</span>Profile
    </a>
  </nav>

  <script src="/js/app.js"></script>
  <script>
    const username = new URLSearchParams(window.location.search).get('u');
    const container = document.getElementById('profile-content');

    async function loadProfile() {
      if (!username) {
        container.innerHTML = '<div class="text-center text-dim" style="padding:4rem">No user specified</div>';
        return;
      }

      const p = await NS.api(`/api/profile/${username}`);
      if (p.error) {
        container.innerHTML = '<div class="text-center text-dim" style="padding:4rem">Profile not found</div>';
        return;
      }

      document.title = `@${p.username} — NarrowScore`;
      const tc = NS.tierColor(p.tier);
      const initials = p.username.slice(0, 2).toUpperCase();
      const isMe = NS.username === p.username;

      let followBtn = '';
      if (!isMe && NS.isLoggedIn) {
        followBtn = `<button class="p-follow-btn ${p.isFollowing ? 'following' : ''}" onclick="toggleFollow()">${p.isFollowing ? 'Following' : 'Follow'}</button>`;
      } else if (!isMe && !NS.isLoggedIn) {
        followBtn = `<button class="p-follow-btn" onclick="NS.login()">Follow</button>`;
      }

      container.innerHTML = `
        <div class="profile-hero">
          <div class="p-avatar" style="background:${p.avatar_color || '#4ECDC4'}">${initials}</div>
          <div class="p-name">@${p.username}</div>
          <div class="p-rank">#${p.rank} on the leaderboard</div>
          <div class="p-social">
            <div class="p-social-item">
              <div class="p-social-num">${p.followers || 0}</div>
              <div class="p-social-label">Followers</div>
            </div>
            <div class="p-social-item">
              <div class="p-social-num">${p.following || 0}</div>
              <div class="p-social-label">Following</div>
            </div>
          </div>
          ${followBtn}
        </div>

        <div class="p-score-section">
          <div class="p-score-big" style="color:${tc}">${p.score}<span style="font-size:1rem;color:var(--dim)">/100</span></div>
          <div class="p-bar"><div class="p-bar-fill" style="width:${p.score}%;background:linear-gradient(90deg,${tc}88,${tc})"></div></div>
          <span class="tier-badge tier-${p.tier}" style="font-size:0.8rem;padding:4px 16px">${p.tier}-TIER ${p.label}</span>
        </div>

        <div class="p-stats-grid">
          <div class="p-stat">
            <div class="p-stat-label">Spend</div>
            <div class="p-stat-value text-magenta">$${Math.round(p.spend_usd)}</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-label">Tokens</div>
            <div class="p-stat-value text-cyan">${NS.formatTokens(p.tokens_total)}</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-label">Days</div>
            <div class="p-stat-value">${p.days_active}</div>
          </div>
        </div>
        <div class="p-stats-grid" style="border-top:none">
          <div class="p-stat">
            <div class="p-stat-label">Sessions</div>
            <div class="p-stat-value">${p.sessions}</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-label">Projects</div>
            <div class="p-stat-value">${p.projects}</div>
          </div>
          <div class="p-stat">
            <div class="p-stat-label">Narrows</div>
            <div class="p-stat-value text-green">${p.narrows_cleared}/${p.narrows_total}</div>
          </div>
        </div>

        ${(p.badges?.length > 0) ? `
          <div class="section-title" style="padding:1rem 1rem 0;margin-bottom:0">Badges</div>
          <div class="p-badges">
            ${p.badges.map(b => `<span class="badge-tag">${b.name || b.badge_id}</span>`).join('')}
          </div>
        ` : ''}

        <div class="section-title" style="padding:1rem 1rem 0;margin-bottom:0">Top Tools</div>
        <div class="p-tools">
          ${(p.top_tools || []).map(t => `<span class="tool-tag">${t}</span>`).join('')}
        </div>

        <div class="p-history">
          <div class="section-title" style="margin-bottom:0.5rem">Score History</div>
          <canvas id="history-chart"></canvas>
        </div>

        <div class="section-title" style="padding:0 1rem;margin-bottom:0">Comments</div>
        <div class="p-comments" id="comments-section"></div>
      `;

      loadComments();
      loadHistory();
    }

    async function toggleFollow() {
      const btn = document.querySelector('.p-follow-btn');
      const isFollowing = btn.classList.contains('following');

      await NS.api(`/api/follow/${username}`, { method: isFollowing ? 'DELETE' : 'POST' });
      btn.classList.toggle('following');
      btn.textContent = isFollowing ? 'Follow' : 'Following';
    }

    async function loadComments() {
      const section = document.getElementById('comments-section');
      const data = await NS.api(`/api/users/${username}/comments`);

      let html = (data.comments || []).map(c => `
        <div class="comment">
          <div class="comment-header">
            <a href="/profile.html?u=${c.username}" class="comment-user">${c.username}</a>
            <span class="comment-time">${NS.timeAgo(c.created_at)}</span>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
      `).join('');

      if (NS.isLoggedIn) {
        html += `<div class="comment-form">
          <input class="comment-input" id="comment-input" placeholder="Leave a comment..." maxlength="500">
          <button class="comment-submit" onclick="postComment()">Post</button>
        </div>`;
      }

      if (!html) html = '<div class="text-dim" style="padding:0.5rem">No comments yet.</div>';
      section.innerHTML = html;
    }

    async function postComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text) return;

      await NS.api(`/api/users/${username}/comments`, {
        method: 'POST',
        body: JSON.stringify({ text }),
      });

      input.value = '';
      loadComments();
    }

    async function loadHistory() {
      const canvas = document.getElementById('history-chart');
      if (!canvas) return;

      const data = await NS.api(`/api/users/${username}/history`);
      if (!data.length) {
        canvas.parentElement.style.display = 'none';
        return;
      }

      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = 300;
      ctx.scale(2, 2);

      const w = rect.width;
      const h = 150;
      const pad = { top: 10, right: 10, bottom: 20, left: 30 };

      const scores = data.map(d => d.score);
      const dates = data.map(d => new Date(d.recorded_at));

      const xScale = (i) => pad.left + (i / Math.max(1, scores.length - 1)) * (w - pad.left - pad.right);
      const yScale = (v) => pad.top + (1 - v / 100) * (h - pad.top - pad.bottom);

      // Grid lines
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 0.5;
      for (const v of [25, 50, 75]) {
        ctx.beginPath();
        ctx.moveTo(pad.left, yScale(v));
        ctx.lineTo(w - pad.right, yScale(v));
        ctx.stroke();
      }

      // Score line
      ctx.strokeStyle = '#00ccff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      scores.forEach((s, i) => {
        const x = xScale(i), y = yScale(s);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Dots
      ctx.fillStyle = '#00ccff';
      scores.forEach((s, i) => {
        ctx.beginPath();
        ctx.arc(xScale(i), yScale(s), 3, 0, Math.PI * 2);
        ctx.fill();
      });

      // Y labels
      ctx.fillStyle = '#666688';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'right';
      for (const v of [0, 25, 50, 75, 100]) {
        ctx.fillText(v, pad.left - 5, yScale(v) + 3);
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    NS.renderNav('profile');
    loadProfile();
  </script>
</body>
</html>
